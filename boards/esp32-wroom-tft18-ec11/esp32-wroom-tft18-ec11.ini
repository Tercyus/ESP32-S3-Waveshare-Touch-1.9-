[env:esp32-wroom-tft18-ec11]
board = esp32dev
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/esp32-wroom-tft18-ec11>
build_flags =
    ${env.build_flags}
    -Iboards/esp32-wroom-tft18-ec11
    -Os
    -DCORE_DEBUG_LEVEL=0

    ; =============================
    ; Board identifier
    ; =============================
    -DESP32_WROOM_TFT18_EC11

    ; =============================
    ; Display ST7735S — TFT_eSPI driver settings
    ; Pin assignments (TFT_MOSI, TFT_SCLK, etc.) come from pins_arduino.h
    ; =============================
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DST7735_GREENTAB
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_BACKLIGHT_ON=HIGH
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=16000000
    -DTOUCH_CS=-1

    ; =============================
    ; IR — allow any free GPIO
    ; =============================
    -DALLOW_ALL_GPIO_FOR_IR_RF=1

    ; =============================
    ; Device name
    ; =============================
    -DDEVICE_NAME='"ESP32 WROOM + TFT 1.8 + EC11"'

lib_deps =
    ${env.lib_deps}
    mathertel/RotaryEncoder @1.5.3
