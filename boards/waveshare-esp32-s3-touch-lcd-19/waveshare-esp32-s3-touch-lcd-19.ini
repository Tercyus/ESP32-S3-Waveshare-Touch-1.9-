[env:waveshare-esp32-s3-touch-lcd-19]
board = waveshare-esp32-s3-touch-lcd-19
board_build.partitions = custom_16Mb.csv
; Override variants_dir so the variant subdir only contains pins_arduino.h (no .cpp).
; interface.cpp is compiled as project source via build_src_filter (full LDF lib paths).
board_build.variants_dir = boards/waveshare-esp32-s3-touch-lcd-19
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_build.psram = enabled

upload_speed = 921600
monitor_speed = 115200

build_src_filter = ${env.build_src_filter} +<../boards/waveshare-esp32-s3-touch-lcd-19>

build_flags =
    ${env.build_flags}
    -Iboards/waveshare-esp32-s3-touch-lcd-19
    -Iboards/waveshare-esp32-s3-touch-lcd-19/variant
    -Isrc
    -Os
    -DCORE_DEBUG_LEVEL=0

    ; =============================
    ; Board identifier
    ; =============================
    -DWAVESHARE_ESP32S3_TOUCH_1_9
    -DBOARD_HAS_PSRAM

    ; =============================
    ; USB CDC
    ; =============================
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; =============================
    ; Display ST7789V2 — LovyanGFX (SPI + DMA)
    ; =============================
    -DUSE_LOVYANGFX=1
    -DLOVYAN_PANEL=Panel_ST7789
    -DLOVYAN_BUS=Bus_SPI
    -DLOVYAN_SPI_BUS=1

    ; SPI bus config
    -DTFT_SPI_HOST=SPI3_HOST
    -DTFT_SPI_MODE=0
    -DTFT_WRITE_FREQ=80000000
    -DTFT_READ_FREQ=20000000
    -DTFT_SPI_3WIRE=0
    -DTFT_USE_LOCK=1

    ; SPI pins
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_SCLK=10
    -DTFT_MISO=-1
    -DTFT_CS=12
    -DTFT_DC=11
    -DTFT_RST=9
    -DTFT_BL=14

    ; Panel config (ST7789 170x320: controller is 240px wide → offset 35)
    -DTFT_BUSY_PIN=-1
    -DTFT_OFFSET_X=35
    -DTFT_OFFSET_Y=0
    -DTFT_INVERTION=0
    -DTFT_RGB_ORDER=0
    -DTFT_MEM_WIDTH=240
    -DTFT_MEM_HEIGHT=320

    ; =============================
    ; Touch CST816 (I2C)
    ; =============================
    -DHAS_TOUCH=1
    -DTOUCH_SDA=47
    -DTOUCH_SCL=48
    -DTOUCH_RST=17
    -DTOUCH_INT=21

    ; =============================
    ; SDMMC (1-bit mode)
    ; =============================
    -DUSE_SD_MMC=1
    -DSDMMC_CLK=41
    -DSDMMC_CMD=39
    -DSDMMC_D0=40
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32-libs/esp32s3/include/fatfs/src
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32-libs/esp32s3/include/fatfs/vfs
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32-libs/esp32s3/include/fatfs/diskio
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32-libs/esp32s3/include/fatfs/**

    ; =============================
    ; I2C (shared: touch CST816 + IMU QMI8658)
    ; =============================
    -DGROVE_SDA=47
    -DGROVE_SCL=48

    ; =============================
    ; External SPI peripherals (CC1101, NRF24)
    ; Pins are user-configurable from Bruce menu
    ; =============================
    -DSPI_SCK_PIN=-1
    -DSPI_MOSI_PIN=-1
    -DSPI_MISO_PIN=-1
    -DSPI_SS_PIN=-1

    -DUSE_CC1101_VIA_SPI
    -DCC1101_GDO0_PIN=-1
    -DCC1101_SS_PIN=-1
    -DCC1101_MOSI_PIN=SPI_MOSI_PIN
    -DCC1101_SCK_PIN=SPI_SCK_PIN
    -DCC1101_MISO_PIN=SPI_MISO_PIN

    -DUSE_NRF24_VIA_SPI
    -DNRF24_CE_PIN=-1
    -DNRF24_SS_PIN=-1
    -DNRF24_MOSI_PIN=SPI_MOSI_PIN
    -DNRF24_SCK_PIN=SPI_SCK_PIN
    -DNRF24_MISO_PIN=SPI_MISO_PIN

    ; =============================
    ; SD card SPI disabled (SDMMC only)
    ; =============================
    -DSDCARD_CS=-1
    -DSDCARD_SCK=-1
    -DSDCARD_MISO=-1
    -DSDCARD_MOSI=-1

    ; =============================
    ; IR (user-configurable)
    ; =============================
    -DALLOW_ALL_GPIO_FOR_IR_RF=1

    ; =============================
    ; Button (BOOT = GPIO 0, active LOW)
    ; =============================
    -DHAS_BTN=1
    -DBTN_PIN=0
    -DBTN_ACT=LOW
    -DBTN_ALIAS='"Boot"'

    ; =============================
    ; Backlight PWM
    ; =============================
    -DMINBRIGHT=1
    -DTFT_BRIGHT_FREQ=1000
    -DTFT_BRIGHT_Bits=8
    -DTFT_BRIGHT_CHANNEL=0

    ; =============================
    ; Battery ADC
    ; =============================
    -DANALOG_BAT_PIN=4

    ; =============================
    ; Screen / display settings
    ; =============================
    -DHAS_SCREEN=1
    -DROTATION=1
    -DFP=1
    -DFM=2
    -DFG=3

    ; =============================
    ; Device name
    ; =============================
    -DDEVICE_NAME='"Waveshare ESP32-S3 Touch 1.9"'

lib_deps =
    ${env.lib_deps}
    https://github.com/mmMicky/TouchLib.git
    lovyan03/LovyanGFX @ ^1.1.16

lib_ignore =
    SD
    TFT_eSPI
